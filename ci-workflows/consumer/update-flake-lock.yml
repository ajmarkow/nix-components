name: Update flake.lock

on:
  # Triggered by the upstream nix-components repo on push to main
  repository_dispatch:
    types: [upstream-flake-updated]

  # Weekly fallback in case a dispatch was missed
  schedule:
    - cron: '0 6 * * 1'

  # Allow manual runs
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Update nix-components input
        # To update ALL inputs instead, replace with: nix flake update
        run: nix flake update nix-components

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/nix-components-flake-lock
          commit-message: "chore(flake): update nix-components flake.lock"
          title: "chore(flake): update nix-components input"
          body: |
            Automated update of `flake.lock` for the `nix-components` input.

            **Triggered by:** `${{ github.event.client_payload.source_repo }}@${{ github.event.client_payload.source_sha }}`

            Review the diff and merge when ready. CI must pass before merging.
          delete-branch: true
          labels: |
            automated
            dependencies
