name: Update paseo-skills flake input

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Update paseo-skills input
        run: nix flake update paseo-skills

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            OLD=$(git show HEAD:flake.lock | jq -r '.nodes["paseo-skills"].locked.rev')
            NEW=$(jq -r '.nodes["paseo-skills"].locked.rev' flake.lock)
            echo "old_rev=${OLD}" >> "$GITHUB_OUTPUT"
            echo "new_rev=${NEW}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for skills changes
        id: skills
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED=$(gh api \
            "repos/getpaseo/paseo/compare/${{ steps.diff.outputs.old_rev }}...${{ steps.diff.outputs.new_rev }}" \
            --jq '[.files[].filename | select(startswith("skills/"))] | length')
          if [ "$CHANGED" -gt 0 ]; then
            echo "skills_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "skills_changed=false" >> "$GITHUB_OUTPUT"
            echo "No skills/ files changed, skipping PR"
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true' && steps.skills.outputs.skills_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update/paseo-skills-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add flake.lock
          git commit -m "chore(flake): update paseo-skills input"
          git push --force origin "$BRANCH"
          if gh pr view "$BRANCH" --json number -q .number 2>/dev/null; then
            echo "PR already exists for $BRANCH, skipping creation"
          else
            gh pr create \
              --title "chore(flake): update paseo-skills" \
              --body "$(cat <<EOF
          Weekly automated update of the \`paseo-skills\` flake input.

          | | Revision |
          |---|---|
          | Before | \`${{ steps.diff.outputs.old_rev }}\` |
          | After  | \`${{ steps.diff.outputs.new_rev }}\` |

          Review the skill changes at https://github.com/getpaseo/paseo/compare/${{ steps.diff.outputs.old_rev }}...${{ steps.diff.outputs.new_rev }}
          EOF
              )" \
              --base main \
              --head "$BRANCH"
          fi
